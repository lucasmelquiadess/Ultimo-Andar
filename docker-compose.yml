services:
  postgres:
    image: postgres:16-alpine
    container_name: ultimo-andar-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ultimo_andar}
      POSTGRES_USER: ${POSTGRES_USER:-ultimo_andar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ultimo_andar}
    ports:
      - "5432:5432"
    volumes:
      - ultimo-andar-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ultimo_andar} -d ${POSTGRES_DB:-ultimo_andar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ultimo-andar-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ultimo_andar}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ultimo_andar}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ultimo_andar}
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-true}
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-admin}
      APP_SECURITY_PASSWORD: ${APP_SECURITY_PASSWORD:-admin123}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:-ultimo-andar-local-dev-secret-change-me}
      APP_SECURITY_TOKEN_MINUTES: ${APP_SECURITY_TOKEN_MINUTES:-60}
      APP_SECURITY_MAX_LOGIN_ATTEMPTS: ${APP_SECURITY_MAX_LOGIN_ATTEMPTS:-5}
      APP_SECURITY_LOCK_MINUTES: ${APP_SECURITY_LOCK_MINUTES:-15}
      APP_SECURITY_LOGIN_RATE_LIMIT_PER_MINUTE: ${APP_SECURITY_LOGIN_RATE_LIMIT_PER_MINUTE:-20}
      APP_CRYPTO_KEY: ${APP_CRYPTO_KEY:-ultimo-andar-local-crypto-key-change-me}
      APP_RETENTION_AUDIT_DAYS: ${APP_RETENTION_AUDIT_DAYS:-365}
      APP_H2_CONSOLE_ENABLED: "false"
      APP_STORAGE_ROOT: /app/data/storage
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8081
    ports:
      - "8080:8080"
    volumes:
      - ultimo-andar-storage:/app/data/storage

  frontend:
    build:
      context: ./frontend
    container_name: ultimo-andar-web
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  ultimo-andar-postgres:
  ultimo-andar-storage:
