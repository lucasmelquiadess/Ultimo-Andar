server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}

spring:
  application:
    name: ultimo-andar-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/db/ultimo-andar;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${APP_H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 24MB

logging:
  level:
    br.com.ultimoandar: INFO

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
    username: ${APP_SECURITY_USERNAME:admin}
    password: ${APP_SECURITY_PASSWORD:admin123}
    jwt-secret: ${APP_SECURITY_JWT_SECRET:ultimo-andar-local-dev-secret-change-me}
    token-minutes: ${APP_SECURITY_TOKEN_MINUTES:60}
    max-login-attempts: ${APP_SECURITY_MAX_LOGIN_ATTEMPTS:5}
    lock-minutes: ${APP_SECURITY_LOCK_MINUTES:15}
    login-rate-limit-per-minute: ${APP_SECURITY_LOGIN_RATE_LIMIT_PER_MINUTE:20}
  crypto:
    key: ${APP_CRYPTO_KEY:ultimo-andar-local-crypto-key-change-me}
  retention:
    audit-days: ${APP_RETENTION_AUDIT_DAYS:365}
  storage:
    root: ${APP_STORAGE_ROOT:./data/storage}
  company:
    name: Último Andar
    cnpj: ${APP_COMPANY_CNPJ:00.000.000/0001-00}
    address: ${APP_COMPANY_ADDRESS:Endereço administrativo não informado}
    privacy-email: ${APP_PRIVACY_EMAIL:privacidade@ultimoandar.local}
    default-city: ${APP_DEFAULT_CITY:São Paulo}
    default-forum: ${APP_DEFAULT_FORUM:São Paulo/SP}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ultimo_andar}
    username: ${SPRING_DATASOURCE_USERNAME:ultimo_andar}
    password: ${SPRING_DATASOURCE_PASSWORD:ultimo_andar}
    driver-class-name: org.postgresql.Driver
